<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeeHunter Bari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block !important; }
        button, div { -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #EAB308 !important; font-weight: 800; }
        .progress-fill { transition: width 0.5s ease-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-pill.active { background-color: #EAB308; color: white; border-color: #EAB308; }
        .badge-locked { filter: grayscale(1); opacity: 0.5; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-32 font-sans">

    <header class="bg-white p-5 sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center mb-2">
            <div onclick="nav('profile')" class="cursor-pointer">
                <p class="text-[10px] font-bold text-gray-400 uppercase leading-none" data-i18n="total_points">Punti Totali</p>
                <div class="flex items-center space-x-2">
                    <span class="text-3xl font-black text-yellow-400 leading-none">150</span>
                    <span class="text-xs">👤</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <div class="flex space-x-2 mb-1">
                    <button onclick="setLanguage('it')" class="text-[10px] font-bold uppercase" id="lang-it">IT</button>
                    <span class="text-gray-300">|</span>
                    <button onclick="setLanguage('en')" class="text-[10px] font-bold uppercase text-gray-400" id="lang-en">EN</button>
                </div>
                <h1 class="text-xl font-black flex items-center justify-end uppercase italic leading-none">BeeHunter <span class="ml-1">🐝</span></h1>
                <span class="bg-green-100 text-green-600 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase italic mt-1" data-i18n="rank">Cacciatore Novizio</span>
            </div>
        </div>
        <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div class="progress-fill h-full bg-yellow-400" style="width: 45%;"></div>
        </div>
    </header>

    <main id="home" class="page active p-5 space-y-6">
        <div class="bg-gradient-to-br from-yellow-400 to-orange-500 p-6 rounded-[40px] text-white shadow-lg">
            <h2 class="text-2xl font-black italic uppercase leading-tight" data-i18n="welcome">Bentornato,<br>Hunter!</h2>
            <p class="text-[10px] font-bold opacity-80 uppercase mt-2">Hai 3 sfide disponibili oggi a Bari Vecchia</p>
        </div>
        
        <h2 class="text-xl font-black italic uppercase" data-i18n="nearby_challenges">Sfide Vicine</h2>
        <div id="home-challenges" class="space-y-4"></div>
    </main>

    <main id="map" class="page p-5">
        <h2 class="text-2xl font-black italic uppercase mb-4 text-center" data-i18n="map_title">Mappa Sfide</h2>
        <div class="w-full h-64 bg-slate-200 rounded-[40px] border-4 border-white shadow-xl mb-6 relative overflow-hidden">
            <div class="absolute inset-0 flex items-center justify-center bg-gray-200">
                <p class="text-gray-500 font-black text-xs uppercase">Interactive Map</p>
            </div>
        </div>
        <div id="map-challenges-list" class="space-y-4"></div>
    </main>

    <main id="camera" class="page p-5 text-center">
        <h2 class="text-2xl font-black italic uppercase mb-4">Scanner QR</h2>
        <div class="w-full h-80 bg-black rounded-[40px] border-4 border-white shadow-2xl overflow-hidden mb-6">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        </div>
        <button onclick="startCamera()" class="bg-yellow-400 text-white px-10 py-4 rounded-full font-black uppercase text-sm shadow-lg" data-i18n="activate_cam">Attiva Camera</button>
    </main>

    <main id="partners" class="page p-5 space-y-4">
        <h2 class="text-2xl font-black italic uppercase text-yellow-500" data-i18n="partners_title">Partner 🤝</h2>
        
        <div class="relative">
            <input type="text" id="partnerSearch" onkeyup="filterPartners()" placeholder="Cerca..." 
                class="w-full bg-white border-2 border-gray-100 rounded-2xl p-4 pl-12 text-sm focus:border-yellow-400 outline-none shadow-sm">
            <span class="absolute left-4 top-4">🔍</span>
        </div>

        <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-2">
            <button onclick="filterByCategory('all')" class="category-pill active whitespace-nowrap px-5 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase transition-all" data-cat="all">Tutti</button>
            <button onclick="filterByCategory('pizza')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase transition-all" data-cat="pizza">🍕 Pizza</button>
            <button onclick="filterByCategory('pub')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase transition-all" data-cat="pub">🍺 Pub</button>
            <button onclick="filterByCategory('food')" class="category-pill whitespace-nowrap px-5 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase transition-all" data-cat="food">🍽️ Food</button>
        </div>

        <div id="partners-list" class="space-y-4"></div>
    </main>

    <main id="shop" class="page p-5 space-y-4">
        <h2 class="text-2xl font-black italic uppercase text-center text-yellow-500" data-i18n="rewards_title">Premi</h2>
        <div id="rewards-list" class="space-y-3"></div>
    </main>

    <main id="profile" class="page p-5">
        <h2 class="text-2xl font-black italic uppercase mb-6" data-i18n="my_badges">I Miei Badge</h2>
        <div class="grid grid-cols-3 gap-4">
            <div class="text-center">
                <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-2 text-3xl">🏅</div>
                <p class="text-[9px] font-black uppercase">Primo Salto</p>
            </div>
            <div class="text-center">
                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-2 text-3xl badge-locked">🍕</div>
                <p class="text-[9px] font-black uppercase text-gray-400">Pizzaiolo</p>
            </div>
            <div class="text-center">
                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-2 text-3xl badge-locked">👟</div>
                <p class="text-[9px] font-black uppercase text-gray-400">Maratoneta</p>
            </div>
        </div>
    </main>

    <main id="partner-detail" class="page p-0">
        <div class="relative h-64">
            <img id="p-img" src="" class="w-full h-full object-cover">
            <button onclick="nav('partners')" class="absolute top-6 left-6 bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl text-white font-black text-[10px] uppercase">← Back</button>
        </div>
        <div class="bg-gray-50 -mt-8 rounded-t-[40px] p-6 relative min-h-screen">
            <h2 id="p-name" class="text-2xl font-black uppercase italic mb-1 text-slate-900">Nome</h2>
            <p id="p-address" class="text-gray-400 text-xs font-bold uppercase mb-6"></p>
            <div class="flex space-x-3 mb-8" id="p-actions"></div>
            <div class="bg-white p-5 rounded-[32px] shadow-sm border border-gray-100">
                <p class="text-[10px] font-black uppercase text-yellow-500 mb-2">Offerta Esclusiva</p>
                <div class="flex items-center space-x-3">
                    <span id="p-reward-icon" class="text-3xl"></span>
                    <p id="p-reward-text" class="text-sm font-bold leading-tight"></p>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t p-3 flex justify-around items-center z-50 shadow-2xl">
        <button onclick="nav('home')" id="n-home" class="nav-active flex flex-col items-center"><span class="text-xl">🏠</span><span class="text-[8px] font-black uppercase mt-1">Home</span></button>
        <button onclick="nav('map')" id="n-map" class="text-gray-300 flex flex-col items-center"><span class="text-xl">📍</span><span class="text-[8px] font-black uppercase mt-1" data-i18n="nav_map">Mappa</span></button>
        <button onclick="nav('camera')" class="bg-yellow-400 p-4 rounded-full -mt-12 text-white shadow-xl active:scale-90 transition-transform"><span class="text-xl">📸</span></button>
        <button onclick="nav('partners')" id="n-partners" class="text-gray-300 flex flex-col items-center"><span class="text-xl">🤝</span><span class="text-[8px] font-black uppercase mt-1">Partner</span></button>
        <button onclick="nav('shop')" id="n-shop" class="text-gray-300 flex flex-col items-center"><span class="text-xl">🎁</span><span class="text-[8px] font-black uppercase mt-1" data-i18n="nav_shop">Premi</span></button>
    </nav>

    <script>
        let currentLang = 'it';
        let currentCategory = 'all';

        const translations = {
            it: {
                total_points: "Punti Totali",
                rank: "Cacciatore Novizio",
                nearby_challenges: "Sfide Vicine",
                map_title: "Mappa Sfide",
                partners_title: "I Nostri Partner",
                rewards_title: "Premi Disponibili",
                nav_map: "Mappa",
                nav_shop: "Premi",
                activate_cam: "Attiva Camera",
                welcome: "Bentornato,<br>Hunter!",
                my_badges: "I Miei Badge",
                call: "Chiama",
                route: "Percorso",
                go: "Vai alla Sfida",
                search_placeholder: "Cerca pizza, pub, sconti..."
            },
            en: {
                total_points: "Total Points",
                rank: "Novice Hunter",
                nearby_challenges: "Nearby Challenges",
                map_title: "Challenge Map",
                partners_title: "Our Partners",
                rewards_title: "Available Rewards",
                nav_map: "Map",
                nav_shop: "Shop",
                activate_cam: "Start Camera",
                welcome: "Welcome back,<br>Hunter!",
                my_badges: "My Badges",
                call: "Call",
                route: "Route",
                go: "Start Challenge",
                search_placeholder: "Search pizza, pub, rewards..."
            }
        };

        const partnersData = [
            { id: '1', name: 'Ristorante Murat', address: 'Via Sparano 10', tags: 'food ristorante tipico', img: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400', rating: 4.8, rewards: [{t: 'Sconto 15%', c: 100, i: '💰'}] },
            { id: '2', name: 'Pizzeria Ferrarese', address: 'Piazza Ferrarese', tags: 'pizza food pizzeria', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400', rating: 4.9, rewards: [{t: 'Birra Omaggio', c: 60, i: '🍺'}] },
            { id: '3', name: 'The Big Pub', address: 'Bari Vecchia', tags: 'pub birra drink', img: 'https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=400', rating: 4.7, rewards: [{t: 'Shot di Benvenuto', c: 30, i: '🥃'}] }
        ];

        const challenges = [
            { t_it: "Il Guardiano del Castello", t_en: "Castle Guardian", d_it: "Trova il QR vicino al Castello.", d_en: "Find the QR near the Castle.", p: 50, i: "🏰" },
            { t_it: "L'Arco basso", t_en: "The Low Arch", d_it: "Raggiungi l'arco delle orecchiette.", d_en: "Reach the Orecchiette arch.", p: 40, i: "🍝" }
        ];

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerHTML = translations[lang][key];
            });
            document.getElementById('partnerSearch').placeholder = translations[lang].search_placeholder;
            document.getElementById('lang-it').classList.toggle('text-yellow-400', lang === 'it');
            document.getElementById('lang-en').classList.toggle('text-yellow-400', lang === 'en');
            renderAll();
        }

        function filterByCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-cat') === cat);
            });
            filterPartners();
        }

        function filterPartners() {
            const query = document.getElementById('partnerSearch').value.toLowerCase();
            const list = document.getElementById('partners-list');
            list.innerHTML = '';
            
            const filtered = partnersData.filter(p => {
                const matchesCat = currentCategory === 'all' || p.tags.includes(currentCategory);
                const matchesSearch = p.name.toLowerCase().includes(query) || p.tags.toLowerCase().includes(query);
                return matchesCat && matchesSearch;
            });

            filtered.forEach(p => {
                list.innerHTML += `
                    <div onclick="openPartner('${p.id}')" class="bg-white p-4 rounded-3xl shadow-sm flex items-center space-x-4 border border-gray-100 active:scale-95 transition-transform">
                        <img src="${p.img}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1">
                            <h4 class="font-black uppercase text-sm">${p.name}</h4>
                            <p class="text-[10px] text-gray-400">${p.address}</p>
                        </div>
                        <div class="text-yellow-400 font-bold text-xs">⭐ ${p.rating}</div>
                    </div>`;
            });
        }

        function renderChallenges() {
            const homeC = document.getElementById('home-challenges');
            const mapC = document.getElementById('map-challenges-list');
            [homeC, mapC].forEach(container => {
                container.innerHTML = '';
                challenges.forEach(ch => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-[32px] shadow-sm border border-gray-50">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-2xl">${ch.i}</span>
                                <span class="bg-green-100 text-green-600 font-black text-[10px] px-2 py-1 rounded-lg">+${ch.p} PT</span>
                            </div>
                            <h3 class="font-black text-sm uppercase">${currentLang === 'it' ? ch.t_it : ch.t_en}</h3>
                            <p class="text-[10px] text-gray-400 font-bold uppercase mb-4 leading-tight">${currentLang === 'it' ? ch.d_it : ch.d_en}</p>
                            <button class="w-full bg-slate-900 text-white py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg">${translations[currentLang].go}</button>
                        </div>`;
                });
            });
        }

        function renderRewards() {
            const list = document.getElementById('rewards-list');
            list.innerHTML = '';
            partnersData.forEach(p => {
                p.rewards.forEach(r => {
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                            <span class="text-2xl">${r.i}</span>
                            <div class="flex-1 ml-4">
                                <h4 class="font-black uppercase text-[10px]">${r.t}</h4>
                                <p class="text-[8px] text-gray-400 font-bold uppercase">${p.name}</p>
                            </div>
                            <button class="bg-yellow-400 text-white px-4 py-2 rounded-xl text-[10px] font-black">${r.c} PT</button>
                        </div>`;
                });
            });
        }

        function openPartner(id) {
            const p = partnersData.find(x => x.id === id);
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-address').innerText = p.address;
            document.getElementById('p-img').src = p.img;
            document.getElementById('p-reward-icon').innerText = p.rewards[0].i;
            document.getElementById('p-reward-text').innerText = p.rewards[0].t;
            document.getElementById('p-actions').innerHTML = `
                <a href="tel:123" class="flex-1 bg-yellow-400 text-white py-4 rounded-2xl text-center font-black text-[10px] uppercase shadow-md">${translations[currentLang].call}</a>
                <a href="#" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl text-center font-black text-[10px] uppercase shadow-md">${translations[currentLang].route}</a>
            `;
            nav('partner-detail');
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
            const activeBtn = document.getElementById('n-' + id);
            if(activeBtn) activeBtn.classList.add('nav-active');
            if(id !== 'camera') stopCamera();
            window.scrollTo(0,0);
        }

        let stream = null;
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
            } catch (err) { alert("Attiva i permessi!"); }
        }
        function stopCamera() { if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; } }

        function renderAll() {
            filterPartners();
            renderChallenges();
            renderRewards();
        }

        // Boot
        renderAll();
    </script>
</body>
</html>
