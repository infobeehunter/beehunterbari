<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeeHunter Bari - Grand Architect Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* Sistema Pagine */
        .page { display: none; min-height: 100vh; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeInUp 0.5s ease; }

        /* FIX Z-INDEX */
        #side-menu { z-index: 10000 !important; transition: transform 0.4s ease; transform: translateX(-100%); }
        #side-menu.open { transform: translateX(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; display: none; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        
        /* Elementi UI */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .hunter-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; transition: 0.3s; }
        .hunter-card:active { transform: scale(0.98); }
        .btn-bee { background: linear-gradient(135deg, #FACC15 0%, #EAB308 100%); color: #000; font-weight: 800; border-radius: 1.5rem; }
        
        #map-radar { height: 400px; border-radius: 2.5rem; overflow: hidden; border: 4px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <aside id="side-menu" class="fixed top-0 left-0 h-full w-80 bg-white p-8 shadow-2xl">
        <h2 class="text-3xl font-black italic text-yellow-500 mb-8">BEEHUNTER</h2>
        <nav class="space-y-4">
            <button onclick="nav('home')" class="w-full text-left p-4 hover:bg-yellow-50 rounded-2xl font-bold flex items-center gap-3">🗺️ Radar</button>
            <button onclick="nav('quests')" class="w-full text-left p-4 hover:bg-yellow-50 rounded-2xl font-bold flex items-center gap-3">📜 Missioni</button>
            <button onclick="nav('transit')" class="w-full text-left p-4 hover:bg-yellow-50 rounded-2xl font-bold flex items-center gap-3">🚌 Trasporti</button>
            <button onclick="nav('profile')" class="w-full text-left p-4 hover:bg-yellow-50 rounded-2xl font-bold flex items-center gap-3">👤 Profilo</button>
        </nav>
    </aside>

    <header class="fixed top-0 w-full z-[8000] p-4 flex justify-between items-center glass border-b">
        <button onclick="toggleMenu()" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-lg text-xl">☰</button>
        <div class="flex items-center gap-3" onclick="nav('profile')">
            <div class="text-right">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Punti</p>
                <p id="header-pts" class="text-xl font-black leading-none">0</p>
            </div>
            <div id="header-avatar" class="w-12 h-12 rounded-2xl bg-slate-200 border-2 border-white shadow-md bg-cover"></div>
        </div>
    </header>

    <div class="pt-24 min-h-screen px-6">
        
        <main id="home" class="page active">
            <div class="mb-6">
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">Radar</h1>
                <p class="text-xs font-bold text-slate-400">Trova i monumenti vicino a te</p>
            </div>
            <div id="map-radar" class="mb-8"></div>
            
            <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Vicini a te</h3>
            <div id="nearby-list" class="flex gap-4 overflow-x-auto pb-6 no-scrollbar"></div>
        </main>

        <main id="quests" class="page">
            <h1 class="text-3xl font-black italic uppercase mb-6">Missioni Speciali</h1>
            <div id="quest-list" class="space-y-4"></div>
        </main>

        <main id="profile" class="page">
            <div class="flex flex-col items-center mb-10">
                <div id="prof-pic" class="w-32 h-32 rounded-[2.5rem] border-8 border-white shadow-2xl mb-4 bg-cover"></div>
                <h2 id="prof-user" class="text-3xl font-black uppercase italic">Hunter</h2>
                <p id="prof-rank" class="text-xs font-bold text-yellow-500 uppercase tracking-widest">Novizio Liv. 1</p>
            </div>
            
            <div class="hunter-card p-6 mb-6">
                <div class="flex justify-between mb-2"><span class="text-xs font-bold uppercase">Livello XP</span><span id="xp-text" class="text-xs font-bold">0 / 200</span></div>
                <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div id="xp-bar" class="h-full bg-yellow-400 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Il tuo Diario</h3>
            <div id="diary-grid" class="grid grid-cols-2 gap-4"></div>
        </main>

        <main id="transit" class="page">
            <h1 class="text-3xl font-black italic uppercase mb-6">Muoversi a Bari</h1>
            <div class="bg-blue-600 p-8 rounded-[2.5rem] text-white mb-8 shadow-xl">
                <p class="text-xs font-bold opacity-80 uppercase mb-2">Abbonamento Hunter</p>
                <h2 class="text-2xl font-black mb-4 leading-tight">Pass 24h AMTAB Illimitato</h2>
                <button class="bg-white text-blue-600 px-6 py-3 rounded-xl font-black text-xs uppercase">Acquista € 2,50</button>
            </div>
            <div id="bus-stops" class="space-y-3"></div>
        </main>

        <main id="camera" class="page text-center">
            <div class="w-full aspect-[3/4] bg-black rounded-[3rem] overflow-hidden mb-8 relative">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                <div class="absolute inset-0 border-[3rem] border-black/40 pointer-events-none"></div>
            </div>
            <button onclick="takePhoto()" class="w-full btn-bee py-6 text-lg uppercase shadow-2xl">📸 Convalida Monumento</button>
        </main>

    </div>

    <script>
        // DATABASE ESTESO
        const DB = {
            points: 0,
            lvl: 1,
            user: { name: "Explorer_Bari", avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Bari" },
            completed: [],
            diary: [],
            monuments: [
                { id: 1, name: "Basilica San Nicola", coords: [41.1315, 16.8722], pts: 50, bus: "Navetta A", desc: "La casa di San Nicola, cuore di Bari Vecchia." },
                { id: 2, name: "Castello Svevo", coords: [41.1288, 16.8644], pts: 60, bus: "Linea 12", desc: "Fortezza millenaria che domina il mare." },
                { id: 3, name: "Teatro Petruzzelli", coords: [41.1235, 16.8732], pts: 40, bus: "Navetta B", desc: "Il tempio della lirica più prestigioso del Sud." },
                { id: 4, name: "Pane e Pomodoro", coords: [41.1185, 16.8920], pts: 30, bus: "Linea 12/", desc: "La spiaggia iconica dei baresi." },
                { id: 5, name: "Palazzo dell'Acquedotto", coords: [41.1215, 16.8752], pts: 45, bus: "Navetta B", desc: "Un capolavoro in stile liberty." }
            ]
        };

        let map, currentTarget;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            closeMenu();
            if(id === 'home') initMap();
            if(id === 'camera') startCamera(); else stopCamera();
            if(id === 'quests') renderQuests();
            if(id === 'profile') renderProfile();
            if(id === 'transit') renderTransit();
        }

        function initMap() {
            if(map) return;
            map = L.map('map-radar', { zoomControl: false }).setView([41.125, 16.872], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);
            
            DB.monuments.forEach(m => {
                L.marker(m.coords).addTo(map).on('click', () => {
                    currentTarget = m;
                    nav('camera');
                });
            });
            renderNearby();
        }

        function renderNearby() {
            const list = document.getElementById('nearby-list');
            list.innerHTML = DB.monuments.map(m => `
                <div onclick="currentTarget=${JSON.stringify(m)}; nav('camera')" class="min-w-[220px] hunter-card p-4 shrink-0">
                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-1">+${m.pts} XP</p>
                    <h4 class="font-bold text-sm truncate">${m.name}</h4>
                    <p class="text-[10px] text-slate-400 mt-2">📍 Bari, Italia</p>
                </div>
            `).join('');
        }

        function renderQuests() {
            document.getElementById('quest-list').innerHTML = DB.monuments.map(m => `
                <div class="hunter-card p-6 flex justify-between items-center">
                    <div>
                        <h4 class="font-black italic uppercase">${m.name}</h4>
                        <p class="text-xs text-slate-400">Bus: ${m.bus}</p>
                    </div>
                    <button class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">VAI</button>
                </div>
            `).join('');
        }

        function renderProfile() {
            document.getElementById('prof-pic').style.backgroundImage = `url(${DB.user.avatar})`;
            document.getElementById('header-avatar').style.backgroundImage = `url(${DB.user.avatar})`;
            document.getElementById('header-pts').innerText = DB.points;
            
            const xpProgress = (DB.points % 200) / 200 * 100;
            document.getElementById('xp-bar').style.width = xpProgress + "%";
            document.getElementById('xp-text').innerText = `${DB.points % 200} / 200`;
            
            document.getElementById('diary-grid').innerHTML = DB.diary.map(img => `
                <div class="aspect-square rounded-3xl bg-cover bg-center shadow-md" style="background-image:url(${img})"></div>
            `).join('');
        }

        function renderTransit() {
            const stops = ["Piazza Aldo Moro", "Via Sparano", "Corso Cavour", "Lungomare"];
            document.getElementById('bus-stops').innerHTML = stops.map(s => `
                <div class="hunter-card p-4 flex justify-between items-center">
                    <span class="font-bold text-sm">🚏 ${s}</span>
                    <span class="text-blue-600 font-black text-xs">Arrivo: 3 min</span>
                </div>
            `).join('');
        }

        // CAMERA LOGIC
        let stream;
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('video').srcObject = stream;
            } catch(e) { alert("Fotocamera non disponibile"); nav('home'); }
        }
        function stopCamera() { if(stream) stream.getTracks().forEach(t => t.stop()); }
        
        function takePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0);
            DB.diary.push(canvas.toDataURL());
            DB.points += currentTarget ? currentTarget.pts : 20;
            alert("CONVALIDATO! Hai guadagnato XP.");
            nav('profile');
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        window.onload = () => { initMap(); renderProfile(); };
    </script>
</body>
</html>
