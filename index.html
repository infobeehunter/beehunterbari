<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeeHunter Bari - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block !important; }
        .nav-active { color: #EAB308 !important; font-weight: 800; }
        #main-map { height: 350px; border-radius: 30px; z-index: 10; }
        .badge-locked { filter: grayscale(1); opacity: 0.3; }
        .ticket-bg { background: radial-gradient(circle at 10px 50%, transparent 10px, #ffffff 11px); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-24 font-sans">

    <header class="bg-white p-5 sticky top-0 z-50 shadow-sm flex justify-between items-center border-b">
        <div>
            <p class="text-[9px] font-black text-gray-400 uppercase">Punti Hunter</p>
            <span id="user-points" class="text-2xl font-black text-yellow-400">150</span>
        </div>
        <div class="text-right">
            <h1 class="text-xl font-black italic uppercase">BeeHunter 🐝</h1>
            <div class="w-24 h-1.5 bg-gray-100 rounded-full mt-1 overflow-hidden">
                <div id="progress-bar" class="bg-yellow-400 h-full transition-all" style="width: 50%"></div>
            </div>
        </div>
    </header>

    <main id="home" class="page active p-5">
        <h2 class="text-lg font-black uppercase italic mb-4 text-slate-700">Mappa Sfide Bari</h2>
        <div id="main-map" class="mb-6 shadow-xl border-4 border-white"></div>
        
        <h3 class="font-black uppercase text-[10px] text-gray-400 mb-3 tracking-widest">Obiettivi del Giorno</h3>
        <div id="daily-tasks" class="space-y-3"></div>
    </main>

    <main id="shop" class="page p-5">
        <h2 class="text-2xl font-black uppercase italic mb-6">Acquista Pass & Bici</h2>
        <div id="pass-list" class="space-y-4"></div>
    </main>

    <main id="my-passes" class="page p-5">
        <h2 class="text-2xl font-black uppercase italic mb-6">I Miei Biglietti</h2>
        <div id="tickets-container" class="space-y-6">
            <p class="text-center text-gray-400 py-10 uppercase font-bold text-xs">Nessun biglietto attivo.</p>
        </div>
    </main>

    <main id="profile" class="page p-5">
        <div id="auth-section" class="bg-white p-6 rounded-[35px] shadow-md mb-8">
            <h3 class="font-black uppercase text-sm mb-4">Diventa un Hunter Ufficiale</h3>
            <div class="space-y-3">
                <input type="text" id="reg-nome" placeholder="Nome" class="w-full p-3 bg-gray-50 rounded-xl text-xs outline-none border focus:border-yellow-400">
                <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 bg-gray-50 rounded-xl text-xs outline-none border focus:border-yellow-400">
                <input type="tel" id="reg-tel" placeholder="Telefono" class="w-full p-3 bg-gray-50 rounded-xl text-xs outline-none border focus:border-yellow-400">
                <button onclick="registerUser()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-xs uppercase">Iscriviti</button>
            </div>
        </div>

        <h3 class="font-black uppercase text-[10px] text-gray-400 mb-4 tracking-widest">I Tuoi Badge (Clicca per info)</h3>
        <div id="badge-grid" class="grid grid-cols-3 gap-4 mb-8"></div>

        <h3 class="font-black uppercase text-[10px] text-gray-400 mb-4 tracking-widest">Foto Diario</h3>
        <div id="diary-grid" class="grid grid-cols-2 gap-2"></div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around items-center z-[1000] shadow-2xl">
        <button onclick="nav('home')" id="n-home" class="nav-active flex flex-col items-center">🏠<span class="text-[8px] font-black uppercase mt-1">Home</span></button>
        <button onclick="nav('shop')" id="n-shop" class="text-gray-400 flex flex-col items-center">🎟️<span class="text-[8px] font-black uppercase mt-1">Shop</span></button>
        <button onclick="nav('my-passes')" id="n-my-passes" class="text-gray-400 flex flex-col items-center">🎒<span class="text-[8px] font-black uppercase mt-1">Pass</span></button>
        <button onclick="nav('profile')" id="n-profile" class="text-gray-400 flex flex-col items-center">👤<span class="text-[8px] font-black uppercase mt-1">Io</span></button>
    </nav>

    <script>
        // Stato Applicazione
        const AppState = {
            points: 150,
            user: null,
            completedTasks: new Set(),
            purchasedPasses: [],
            diary: [],
            badges: [
                { id: 'pioneer', n: 'Pioniere', icon: '🐝', desc: 'Primo accesso effettuato', date: '16/03/2024', locked: false },
                { id: 'foodie', n: 'Foodie', icon: '🍕', desc: 'Visita 3 partner gastronomici', date: '-', locked: true },
                { id: 'captain', n: 'Capitano', icon: '🚢', desc: 'Completa il tour in barca', date: '-', locked: true }
            ],
            tasks: [
                { id: 't1', n: 'Castello Svevo', pts: 20, coords: [41.1288, 16.8644], cat: 'Cultura' },
                { id: 't2', n: 'Basilica San Nicola', pts: 25, coords: [41.1315, 16.8722], cat: 'Storia' },
                { id: 't3', n: 'Pane e Pomodoro', pts: 15, coords: [41.1186, 16.8878], cat: 'Relax' }
            ],
            passes: [
                { id: 'bike_bari', n: 'Bari Vecchia in Bici', price: 5, bus: 'Navetta A', route: 'Piazza Moro -> Castello -> Basilica', advice: 'Porta acqua, i vicoli sono caldi!' },
                { id: 'sea_tour', n: 'Capitano di Porto', price: 15, bus: 'Linea 12', route: 'Molo San Nicola -> Lungomare -> Pane e Pomodoro', advice: 'Ottimo al tramonto.' }
            ]
        };

        let map;
        function initMap() {
            map = L.map('main-map').setView([41.1171, 16.8719], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);
            
            // Marker Sfide
            AppState.tasks.forEach(t => {
                L.marker(t.coords).addTo(map)
                    .bindPopup(`<div class="text-center font-black uppercase text-[10px]">${t.n}<br><span class="text-yellow-500">+${t.pts}PT</span></div>`);
            });

            // Posizione Utente Simulata
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const userCoords = [pos.coords.latitude, pos.coords.longitude];
                    L.circle(userCoords, {radius: 200, color: '#EAB308'}).addTo(map).bindPopup("Tu sei qui");
                    map.setView(userCoords, 14);
                });
            }
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('nav-active', 'text-gray-400'));
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.replace('text-gray-400', 'nav-active');
            
            if(id === 'home' && !map) setTimeout(initMap, 100);
            renderContent(id);
        }

        function renderContent(id) {
            if(id === 'daily-tasks') {
                const container = document.getElementById('daily-tasks');
                container.innerHTML = AppState.tasks.map(t => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                        <div><p class="text-[8px] font-black text-yellow-500 uppercase">${t.cat}</p><p class="font-black text-xs uppercase">${t.n}</p></div>
                        <button onclick="claimPoints('${t.id}', ${t.pts})" id="btn-${t.id}" class="${AppState.completedTasks.has(t.id) ? 'bg-gray-100 text-gray-400' : 'bg-green-500 text-white'} px-4 py-2 rounded-xl font-black text-[10px] uppercase">
                            ${AppState.completedTasks.has(t.id) ? 'Fatto' : '+'+t.pts+'pt'}
                        </button>
                    </div>
                `).join('');
            }
            if(id === 'shop') {
                document.getElementById('pass-list').innerHTML = AppState.passes.map(p => `
                    <div class="bg-white p-5 rounded-[30px] border-l-8 border-yellow-400 shadow-sm">
                        <h3 class="font-black text-lg uppercase leading-none">${p.n}</h3>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase font-bold">Bus consigliato: ${p.bus}</p>
                        <button onclick="buyPass('${p.id}')" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-2xl font-black text-xs uppercase">Acquista €${p.price}</button>
                    </div>
                `).join('');
            }
            if(id === 'profile') {
                document.getElementById('badge-grid').innerHTML = AppState.badges.map(b => `
                    <div onclick="showBadgeInfo('${b.id}')" class="${b.locked ? 'badge-locked' : ''} bg-white p-3 rounded-2xl text-center shadow-sm">
                        <div class="text-2xl">${b.icon}</div>
                        <p class="text-[8px] font-black uppercase mt-1 leading-tight">${b.n}</p>
                    </div>
                `).join('');
            }
        }

        function claimPoints(id, pts) {
            if(AppState.completedTasks.has(id)) return;
            AppState.completedTasks.add(id);
            AppState.points += pts;
            updateUI();
            renderContent('daily-tasks');
            alert(`Obiettivo raggiunto! +${pts} punti.`);
        }

        function buyPass(id) {
            const pass = AppState.passes.find(p => p.id === id);
            AppState.purchasedPasses.push({ ...pass, ticketID: 'BH-' + Math.floor(Math.random()*10000) });
            alert("Acquisto completato! Trovi il biglietto in 'Miei Pass'");
            renderTickets();
        }

        function renderTickets() {
            const container = document.getElementById('tickets-container');
            if(AppState.purchasedPasses.length === 0) return;
            container.innerHTML = AppState.purchasedPasses.map(t => `
                <div class="ticket-bg p-6 rounded-3xl shadow-xl border border-gray-100 relative overflow-hidden">
                    <div class="flex justify-between items-start mb-6">
                        <div><p class="text-[8px] font-black text-yellow-500 uppercase italic">Digital Ticket</p><h3 class="text-xl font-black uppercase italic">${t.n}</h3></div>
                        <div class="text-right"><p class="font-black text-[10px]">${t.ticketID}</p></div>
                    </div>
                    <div class="space-y-3 mb-6">
                        <div class="flex items-center text-[10px] font-bold uppercase"><span class="mr-2">🚌</span> BUS: ${t.bus}</div>
                        <div class="flex items-center text-[10px] font-bold uppercase"><span class="mr-2">📍</span> ITINERARIO: ${t.route}</div>
                    </div>
                    <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-100 italic text-[10px] text-yellow-700">
                        💡 Consiglio: ${t.advice}
                    </div>
                </div>
            `).join('');
        }

        function registerUser() {
            const nome = document.getElementById('reg-nome').value;
            if(!nome) return alert("Inserisci i dati!");
            AppState.user = { nome };
            document.getElementById('auth-section').innerHTML = `<p class="font-black text-center text-green-600 uppercase italic text-sm">Benvenuto Hunter, ${nome}! 🐝</p>`;
        }

        function showBadgeInfo(id) {
            const b = AppState.badges.find(x => x.id === id);
            alert(`Badge: ${b.n}\nDescrizione: ${b.desc}\nData Sblocco: ${b.date}`);
        }

        function updateUI() {
            document.getElementById('user-points').innerText = AppState.points;
            document.getElementById('progress-bar').style.width = Math.min((AppState.points/500)*100, 100) + '%';
        }

        // Avvio
        window.onload = () => {
            renderContent('daily-tasks');
            updateUI();
            initMap();
        };
    </script>
</body>
</html>
